# Local dev overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  logistic-service:
    env_file:
      - ./logistic-service/.env.local
    environment:
      LOGISTIC_APP_ENV: local
  
  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    networks: [backend]
