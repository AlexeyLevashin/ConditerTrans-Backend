services:
  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks: [backend]

  file-service:
    build:
      context: ./file-service
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - backend
    restart: always

  logistic-service:
    build:
      context: ./logistic-service
      dockerfile: Dockerfile
    env_file:
      - ./logistic-service/.env.prod
    environment:
      LOGISTIC_APP_ENV: prod
    networks:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - logistic-service
    networks: [backend]

networks:
  backend: