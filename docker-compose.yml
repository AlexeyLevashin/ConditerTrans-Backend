services:
  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks: [backend]

  file-service:
    build:
      context: ./file-service
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - backend
    restart: always

  logistic-service:
    build:
      context: ./logistic-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      LOGISTIC_APP_ENV: prod
    networks:
      - backend
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks: [backend]

networks:
  backend: